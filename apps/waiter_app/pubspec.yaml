name: waiter_app
description: RestaurantOS — App del mesero
publish_to: none
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../../packages/core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  intl: ">=0.19.0 <1.0.0"
  google_fonts: ^6.2.0
  # HTTP client for BFF calls — dart:io alone lacks convenient JSON body helpers.
  # Rejected: dio (overkill for a single endpoint), http was already a transitive dep.
  http: ^1.2.0

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
